services:
  portfolio:
    build:
      context: .
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_FRONTEND_URL: ${VITE_FRONTEND_URL}
    ports:
      - "${PORT}:3001"
    environment:
      PORT: ${PORT}
      FILES_BASE_PATH: ${FILES_BASE_PATH}
    volumes:
      - ~/portpholio-data:/data